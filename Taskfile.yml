version: '3'

vars:
  FLAKE: ./nix
  HOST:
    sh: |
      if uname -r | grep -qi microsoft; then
        echo nixos-wsl
      else
        hostname
      fi

tasks:
  fmt:
    desc: Format all Nix files
    dir: nix
    cmds:
      - nix fmt

  check:
    desc: Check flake for errors and formatting
    cmds:
      - nix flake check {{.FLAKE}}

  apply:
    desc: Apply system configuration
    cmds:
      - nh os switch --diff always {{.FLAKE}} -H {{.HOST}}
    preconditions:
      - sh: command -v nh
        msg: "nh is not installed"

  clean:
    desc: Perform garbage collection and cleanup
    cmds:
      - nh clean all
      - nix-collect-garbage -d
      - sudo nix-collect-garbage -d
    preconditions:
      - sh: command -v nh
        msg: "nh is not installed"

  test-actions:
    desc: Test GitHub Actions locally using act and podman
    cmds:
      - export DOCKER_HOST=unix://\$XDG_RUNTIME_DIR/podman/podman.sock && act -j verify --remote-name origin --container-options "--privileged --userns=host"
    preconditions:
      - sh: command -v act
        msg: "act is not installed. Run 'nix develop' or add it to your shell."
      - sh: systemctl --user is-active podman.socket
        msg: "podman.socket is not running. Run 'systemctl --user start podman.socket'"

  default:
    desc: List available tasks
    cmds:
      - task --list
