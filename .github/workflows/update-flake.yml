name: Update Flake
on:
  schedule:
    - cron: "0 0 * * 4" # Every Thursday at midnight
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@786fff0690178f1234e4e1fe9b536e94f5433196 # v20
        with:
          extra-conf: "accept-flake-config = true"
      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          path-to-flake-dir: nix
          pr-title: "chore(nix): update flake.lock"
          pr-labels: |
            dependencies
            nix
          commit-msg: "chore(nix): update flake.lock"
