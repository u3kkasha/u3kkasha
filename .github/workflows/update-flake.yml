name: Update Flake
on:
  schedule:
    - cron: "0 0 * * 4" # Every Thursday at midnight
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: "accept-flake-config = true"
      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          path-to-flake-dir: nix
          pr-title: "chore(nix): update flake.lock"
          pr-labels: |
            dependencies
            nix
          commit-msg: "chore(nix): update flake.lock"
